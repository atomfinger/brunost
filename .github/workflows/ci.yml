name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Bygg og test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Bygg
        run: zig build

      - name: Køyr testar
        run: zig build test

      - name: Krysskompilar (alle release-mål)
        run: |
          for TRIPLE in x86_64-linux-gnu aarch64-linux-gnu x86_64-macos aarch64-macos x86_64-windows; do
            echo "Checking $TRIPLE"
            zig build -Dtarget="$TRIPLE" -Doptimize=ReleaseSafe
          done
