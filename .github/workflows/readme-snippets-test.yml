name: Validate README Brunost Snippets

on:
  push:
    paths:
      - "readme.md"
  pull_request:
    paths:
      - "readme.md"

jobs:
  run-snippets:
    runs-on: ubuntu-latest

    steps:
      - name: sjekk ut repoet
        uses: actions/checkout@v4

      - name: Sett opp Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.0

      - name: Bygg Brunost
        run: zig build

      - name: Extract code snippets
        run: |
          mkdir -p snippets

          awk '
          BEGIN {
            inside=0
            skip=0
            count=0
            filename=""
          }

          /^```python/ {
            inside=1
            skip = ($0 ~ /skip|ignore/)
            if (!skip) {
              count++
              filename=sprintf("snippets/snippet-%02d.brunost", count)
            } else {
              filename=""
            }
            next
          }

          /^```/ {
            inside=0
            skip=0
            if (filename != "") {
              close(filename)
            }
            next
          }

          inside && !skip && filename != "" {
            print >> filename
          }
          ' readme.md

      - name: Vis snutter
        run: |
          echo "Extracted files:"
          ls -la snippets || true

      - name: Kjør snutter
        run: |
          for file in snippets/*.brunost; do
            echo "Running brunost on $file"
            ./zig-out/bin/brunost --debug "$file"
          done
