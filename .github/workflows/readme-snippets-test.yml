name: Validate README Brunost Snippets

on:
  push:
    paths:
      - "readme.md"
  pull_request:
    paths:
      - "readme.md"

jobs:
  run-snippets:
    runs-on: ubuntu-latest

    steps:
      - name: sjekk ut repoet
        uses: actions/checkout@v4

      - name: Sett opp Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.0

      - name: Bygg Brunost
        run: zig build

      - name: Få kodesnuttane
        run: |
          mkdir -p snippets

          awk '
          BEGIN {
            inside=0
            count=0
          }
          /^```/ {
            if (inside == 0) {
              inside=1
              count++
              filename=sprintf("snippets/snippet-%02d.brunost", count)
              next
            } else {
              inside=0
              next
            }
          }
          inside {
            print >> filename
          }
          ' readme.md

      - name: Vis snutter
        run: |
          echo "Extracted files:"
          ls -la snippets || true

      - name: Kjør snutter
        run: |
          for file in snippets/*.brunost; do
            echo "Running brunost on $file"
            ./zig-out/bin/brunost "$file"
          done
