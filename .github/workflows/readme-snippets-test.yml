name: Validate README Brunost Snippets

on:
  push:
    paths:
      - "README.md"
      - "scripts/run_readme_snippets.py"
  pull_request:
    paths:
      - "README.md"
      - "scripts/run_readme_snippets.py"

jobs:
  run-snippets:
    runs-on: ubuntu-latest

    steps:
      - name: sjekk ut repoet
        uses: actions/checkout@v4

      - name: Sett opp Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Bygg Brunost
        run: zig build

      - name: Trekk ut og køyr README-snutter
        run: python3 scripts/run_readme_snippets.py
